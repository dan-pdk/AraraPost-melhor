<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AraraPost - Cadastro</title>
    <link rel="stylesheet" href="CSS/cadastro.css">
</head>
<body>
    <main>
        <div class="esq">
            <h1 id="title-esq">Bem vindo!</h1>
            <p id="text1">Crie sua conta agora no AraraPost para interagir e publicar seus projetos!</p>
            <p id="text2">Já possui uma conta?</p>
            <a href="login.html"><button id="entrar">Entrar</button></a>
        </div>
        
        <div class="dir">

            <h1 id="title-dir">Crie uma nova conta</h1>
            <a href="index.html" id="text3">Voltar</a>
            <ul class="imagens">
                <li><img src="Imagens/github.png" alt=""></li>
                <li><img src="Imagens/google.png" alt=""></li>
                <li><img src="Imagens/linkedin.png" alt=""></li>
            </ul>
            <ul class="inputs">
                <li><input id="apelido-input" type="text" placeholder="Apelido"></li>
                <li><input id="email-input" type="text" placeholder="Email"></li>
                <li><input id="senha-input" type="text" placeholder="Senha"></li>
            </ul>

            <button id="cadastrar">Cadastrar</button>
        </div>
    </main>
</body>
</html>
